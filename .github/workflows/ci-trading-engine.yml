name: CI - trading-engine

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'requirements*.txt'
      - 'pytest.ini'
      - '.github/workflows/ci-trading-engine.yml'
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Type check (mypy)
        run: mypy api/

      - name: Lint (flake8)
        run: flake8 api/

      - name: Run tests
        run: pytest -v tests/
